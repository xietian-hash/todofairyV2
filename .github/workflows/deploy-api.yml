name: Deploy API

on:
  push:
    branches:
      - main

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    env:
      DEPLOY_DIR_NAME: api-todofairyV2
      DEPLOY_ARCHIVE: deploy-bundle.tar.gz
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Notify deploy start
        continue-on-error: true
        env:
          WEBHOOK: ${{ secrets.WECHAT_ROBOT_WEBHOOK }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          MSG="🚀 开始部署｜任务精灵v2
提交：${SHA:0:7} ${COMMIT_MSG}
触发人：${ACTOR}
详情：${RUN_URL}"
          curl -s -X POST "$WEBHOOK" \
            -H 'Content-Type: application/json' \
            --data-binary "$(jq -n --arg c "$MSG" '{msgtype:"text",text:{content:$c}}')"

      - name: Create deploy bundle
        run: |
          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=node_modules \
            --exclude=apps/miniprogram \
            --exclude=data \
            --exclude=coverage \
            -czf "$DEPLOY_ARCHIVE" .

      - name: Upload deploy bundle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "${{ env.DEPLOY_ARCHIVE }}"
          target: "~/${{ env.DEPLOY_DIR_NAME }}"
          overwrite: true

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
          DEPLOY_DIR_NAME: ${{ env.DEPLOY_DIR_NAME }}
          DEPLOY_ARCHIVE: ${{ env.DEPLOY_ARCHIVE }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: PROD_ENV_FILE,DEPLOY_DIR_NAME,DEPLOY_ARCHIVE
          script_stop: true
          script: |
            set -e

            DEPLOY_DIR="$HOME/$DEPLOY_DIR_NAME"
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"

            tar -xzf "$DEPLOY_ARCHIVE"
            rm -f "$DEPLOY_ARCHIVE"

            printf '%s' "$PROD_ENV_FILE" > .env.production

            docker compose -f docker-compose.deploy.yml build --pull
            docker compose -f docker-compose.deploy.yml run --rm api pnpm --filter @todo-fairy/api prisma:migrate:deploy
            docker compose -f docker-compose.deploy.yml up -d api
            docker image prune -f

      - name: Notify deploy success
        if: success()
        continue-on-error: true
        env:
          WEBHOOK: ${{ secrets.WECHAT_ROBOT_WEBHOOK }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          MSG="✅ 部署成功｜任务精灵v2
提交：${SHA:0:7}
触发人：${ACTOR}
详情：${RUN_URL}"
          curl -s -X POST "$WEBHOOK" \
            -H 'Content-Type: application/json' \
            --data-binary "$(jq -n --arg c "$MSG" '{msgtype:"text",text:{content:$c}}')"

      - name: Notify deploy failure
        if: failure()
        continue-on-error: true
        env:
          WEBHOOK: ${{ secrets.WECHAT_ROBOT_WEBHOOK }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          MSG="❌ 部署失败｜任务精灵v2
提交：${SHA:0:7}
触发人：${ACTOR}
详情：${RUN_URL}"
          curl -s -X POST "$WEBHOOK" \
            -H 'Content-Type: application/json' \
            --data-binary "$(jq -n --arg c "$MSG" '{msgtype:"text",text:{content:$c}}')"
